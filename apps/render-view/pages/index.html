<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render Viewer</title>
    <script src="https://unpkg.com/cesium/Build/Cesium/Cesium.js"></script>
    <link href="https://unpkg.com/cesium/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <style>
      html,
      body,
      #viewer {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #020617;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const routePath = params.get('routePath');
      const routeJson = params.get('routeJson');
      const totalFrames = Number(params.get('frames') || 300);
      const seed = params.get('seed') || 'seed';

      function mulberry32(input) {
        let t = input;
        return function () {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }

      const seedNum = [...seed].reduce((acc, char) => acc + char.charCodeAt(0), 0);
      const random = mulberry32(seedNum);

      async function loadRoute() {
        if (routeJson) {
          try {
            return JSON.parse(decodeURIComponent(routeJson));
          } catch {
            return null;
          }
        }
        if (!routePath) {
          return null;
        }
        const response = await fetch(`file://${routePath}`).catch(() => null);
        if (response && response.ok) {
          return response.json();
        }
        const fallback = await fetch(`http://localhost:3001/routes/${routePath.split('/').pop()?.replace('.json', '') || ''}`);
        if (fallback.ok) {
          return fallback.json();
        }
        return null;
      }

      const viewer = new Cesium.Viewer('viewer', {
        baseLayerPicker: false,
        timeline: false,
        animation: false,
        geocoder: false,
        sceneModePicker: false,
        homeButton: false,
        fullscreenButton: false,
        infoBox: false,
        selectionIndicator: false,
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org' })
      });

      let points = [];
      let vessel;

      function setFrame(frame, total) {
        if (!points.length || !vessel) {
          return;
        }
        const ratio = Math.max(0, Math.min(1, frame / Math.max(1, total - 1)));
        const index = Math.floor(ratio * (points.length - 1));
        const current = points[index];

        vessel.position = Cesium.Cartesian3.fromDegrees(current.lon, current.lat, 100);
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(current.lon, current.lat, 12000),
          orientation: { heading: 0, pitch: Cesium.Math.toRadians(-20), roll: 0 }
        });
      }

      window.__setFrame = setFrame;

      loadRoute().then((payload) => {
        points = payload?.points || Array.from({ length: 180 }, (_, i) => ({
          lat: 51.9 + Math.sin((i / 179) * Math.PI * 2) * (0.1 + random() * 0.06),
          lon: 4.1 + (i / 179) * (0.3 + random() * 0.15)
        }));

        viewer.entities.add({
          polyline: {
            positions: points.map((p) => Cesium.Cartesian3.fromDegrees(p.lon, p.lat, 0)),
            width: 3,
            material: Cesium.Color.CYAN
          }
        });

        vessel = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(points[0].lon, points[0].lat, 100),
          billboard: {
            image: '/public/icons/cargo.svg',
            width: 40,
            height: 40
          }
        });

        setFrame(0, totalFrames);
      });
    </script>
  </body>
</html>
